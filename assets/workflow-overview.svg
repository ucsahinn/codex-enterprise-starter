<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Codex Enterprise Starter workflow overview</title>
  <desc id="desc">A workflow diagram showing install, route, research, implement, verify, and release readiness steps for the Codex Enterprise Starter.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0f766e"/>
    </marker>
  </defs>
  <rect width="1120" height="520" rx="24" fill="#f8fafc"/>
  <rect x="32" y="32" width="1056" height="456" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="72" y="86" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f172a">One-shot Codex setup flow</text>
  <text x="72" y="120" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#475569">Tek kurulumdan sonra Codex uzman ajanlar, MCP kaynakları ve güvenli doğrulama kapılarıyla çalışır.</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(72 178)">
      <rect width="152" height="116" rx="14" fill="#ecfeff" stroke="#0e7490"/>
      <text x="22" y="38" font-size="18" font-weight="800" fill="#0f172a">Install</text>
      <text x="22" y="68" font-size="14" fill="#334155">-All / --all</text>
      <text x="22" y="92" font-size="14" fill="#334155">templates + plugin</text>
    </g>
    <g transform="translate(258 178)">
      <rect width="152" height="116" rx="14" fill="#f0fdf4" stroke="#15803d"/>
      <text x="22" y="38" font-size="18" font-weight="800" fill="#0f172a">Route</text>
      <text x="22" y="68" font-size="14" fill="#334155">AGENTS.md</text>
      <text x="22" y="92" font-size="14" fill="#334155">profiles + rules</text>
    </g>
    <g transform="translate(444 178)">
      <rect width="152" height="116" rx="14" fill="#eef2ff" stroke="#4338ca"/>
      <text x="22" y="38" font-size="18" font-weight="800" fill="#0f172a">Research</text>
      <text x="22" y="68" font-size="14" fill="#334155">OpenAI Docs</text>
      <text x="22" y="92" font-size="14" fill="#334155">Context7 + seq</text>
    </g>
    <g transform="translate(630 178)">
      <rect width="152" height="116" rx="14" fill="#fff7ed" stroke="#c2410c"/>
      <text x="22" y="38" font-size="18" font-weight="800" fill="#0f172a">Implement</text>
      <text x="22" y="68" font-size="14" fill="#334155">main thread</text>
      <text x="22" y="92" font-size="14" fill="#334155">selected skills</text>
    </g>
    <g transform="translate(816 178)">
      <rect width="152" height="116" rx="14" fill="#fefce8" stroke="#a16207"/>
      <text x="22" y="38" font-size="18" font-weight="800" fill="#0f172a">Verify</text>
      <text x="22" y="68" font-size="14" fill="#334155">test + browser</text>
      <text x="22" y="92" font-size="14" fill="#334155">security scan</text>
    </g>
  </g>

  <g fill="none" stroke="#0f766e" stroke-width="3" marker-end="url(#arrow)">
    <path d="M224 236 H252"/>
    <path d="M410 236 H438"/>
    <path d="M596 236 H624"/>
    <path d="M782 236 H810"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="72" y="352" width="280" height="78" rx="14" fill="#f8fafc" stroke="#94a3b8"/>
    <text x="96" y="382" font-size="17" font-weight="800" fill="#0f172a">Specialist agents</text>
    <text x="96" y="410" font-size="14" fill="#475569">mapper, researcher, reviewer, UI, security, test, release</text>
    <rect x="420" y="352" width="280" height="78" rx="14" fill="#f8fafc" stroke="#94a3b8"/>
    <text x="444" y="382" font-size="17" font-weight="800" fill="#0f172a">Safe defaults</text>
    <text x="444" y="410" font-size="14" fill="#475569">sandbox on, approvals interactive, external MCPs disabled</text>
    <rect x="768" y="352" width="280" height="78" rx="14" fill="#f8fafc" stroke="#94a3b8"/>
    <text x="792" y="382" font-size="17" font-weight="800" fill="#0f172a">Public readiness</text>
    <text x="792" y="410" font-size="14" fill="#475569">bilingual docs, completion audit, validation, Gitleaks</text>
  </g>
</svg>
