<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Codex Enterprise Starter banner</title>
  <desc id="desc">A public-safe banner showing a Codex setup package with agents, MCP connectors, skills, security checks, and bilingual documentation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="52%" stop-color="#164e63"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#020617" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <path d="M72 318 C210 238 300 362 438 284 C568 210 676 236 798 176 C932 110 1028 142 1128 90" fill="none" stroke="#67e8f9" stroke-width="3" stroke-opacity="0.55"/>
  <path d="M86 354 C208 296 318 330 446 310 C612 284 708 164 864 192 C984 214 1046 184 1134 126" fill="none" stroke="#a7f3d0" stroke-width="2" stroke-opacity="0.42"/>

  <g filter="url(#shadow)">
    <rect x="70" y="68" width="470" height="246" rx="18" fill="#f8fafc"/>
    <rect x="92" y="92" width="92" height="18" rx="9" fill="#0f766e"/>
    <rect x="92" y="128" width="340" height="18" rx="9" fill="#0f172a"/>
    <rect x="92" y="164" width="386" height="12" rx="6" fill="#94a3b8"/>
    <rect x="92" y="188" width="314" height="12" rx="6" fill="#cbd5e1"/>
    <rect x="92" y="230" width="116" height="38" rx="10" fill="#0f766e"/>
    <rect x="224" y="230" width="126" height="38" rx="10" fill="#e2e8f0"/>
    <text x="92" y="340" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" fill="#e0f2fe">English + Türkçe</text>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" fill="#ecfeff">
    <text x="610" y="108" font-size="58" font-weight="800">Codex Enterprise Starter</text>
    <text x="614" y="154" font-size="23" fill="#ccfbf1">One-shot setup for agents, skills, MCPs, rules, and safe release checks.</text>
    <text x="614" y="188" font-size="23" fill="#dbeafe">Tek kurulumla uzman ajanlı, güvenli ve iki dilli Codex çalışma alanı.</text>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">
    <rect x="614" y="234" width="132" height="44" rx="12" fill="#f8fafc"/>
    <text x="646" y="263" fill="#0f172a">Agents</text>
    <rect x="762" y="234" width="112" height="44" rx="12" fill="#ecfeff"/>
    <text x="797" y="263" fill="#0f172a">MCP</text>
    <rect x="890" y="234" width="112" height="44" rx="12" fill="#f0fdf4"/>
    <text x="924" y="263" fill="#0f172a">Skills</text>
    <rect x="1018" y="234" width="120" height="44" rx="12" fill="#f8fafc"/>
    <text x="1050" y="263" fill="#0f172a">Verify</text>
  </g>

  <g fill="none" stroke="#bae6fd" stroke-width="3" stroke-linecap="round">
    <path d="M746 256 H762"/>
    <path d="M874 256 H890"/>
    <path d="M1002 256 H1018"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#d1fae5">
    <text x="614" y="328">Public-safe starter package</text>
    <text x="614" y="354">No tokens, sessions, memories, cookies, private keys, or machine state</text>
  </g>
</svg>
